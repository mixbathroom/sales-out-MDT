<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beger Sales Out Intelligence</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
.custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
.custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes lc-spin { to { transform: rotate(360deg); } }
@keyframes lc-pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
#loading-cover {
  position:fixed;inset:0;z-index:99999;
  background:linear-gradient(135deg,#e8f0fb 0%,#dbeafe 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity 0.45s ease;
}
#loading-cover.fade-out { opacity:0; pointer-events:none; }
#lc-ring {
  width:52px;height:52px;border-radius:50%;
  border:4px solid rgba(0,90,171,0.15);
  border-top-color:#005AAB;
  animation:lc-spin 0.85s linear infinite;
}
#lc-title { color:#003876;font-size:20px;font-weight:900;letter-spacing:-0.5px; }
#lc-sub { color:rgba(0,56,118,0.5);font-size:12px;font-weight:500;animation:lc-pulse 1.6s ease-in-out infinite; }
@media print {
  @page { size: landscape; margin: 8mm; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<!-- Loading cover — hides FOUC while React + Tailwind boot -->
<div id="loading-cover">
  <div id="lc-ring"></div>
  <div id="lc-title">สีเบเยอร์</div>
  <div id="lc-sub">กำลังโหลด Beger Sales Out Intelligence…</div>
</div>
<script>
(function(){
  var cover=document.getElementById('loading-cover');
  if(!cover) return;
  var root=document.getElementById('root')||document.body;
  var done=false;
  function hideCover(){
    if(done) return; done=true;
    cover.classList.add('fade-out');
    setTimeout(function(){cover.style.display='none';},460);
  }
  // Watch for React render: first element with a Tailwind class inside #root
  var lcObs=new MutationObserver(function(){
    var root2=document.getElementById('root');
    if(root2&&root2.querySelector('[class*="bg-"]')){
      // React + Tailwind both applied; small extra delay for paint
      setTimeout(hideCover, 150);
      lcObs.disconnect();
    }
  });
  lcObs.observe(document.body,{childList:true,subtree:true});
  // Hard fallback: always hide after 6s
  setTimeout(hideCover,6000);
})();
</script>

<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;">
    <div style="text-align:center;color:#64748b">
      <div style="width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#005AAB;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div>
      <div style="font-size:14px;font-weight:600;color:#003876">กำลังโหลด Beger Sales Out Intelligence...</div>
    </div>
  </div>
</div>
<!-- Spotlight overlay using Canvas -->
<canvas id="spot-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9998;pointer-events:none;display:block;"></canvas>
<div id="spot-label" onclick="hideUploadHint()" style="
  position:fixed;z-index:9999;
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,0.72);
  color:#fff;
  font-family:ui-sans-serif,system-ui,sans-serif;
  font-size:13px;font-weight:600;
  padding:9px 18px;border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  cursor:pointer;user-select:none;white-space:nowrap;
  opacity:0;transition:opacity 0.4s;
">
  <span style="width:8px;height:8px;border-radius:50%;background:#fff;display:inline-block;flex-shrink:0;"></span>
  กดที่นี่เพื่ออัปโหลดไฟล์ข้อมูล
  <span style="opacity:0.6;font-size:12px;">✕</span>
</div>
<script>
(function(){
  var canvas = document.getElementById('spot-canvas');
  var label  = document.getElementById('spot-label');
  var ctx    = canvas.getContext('2d');
  var cx = window.innerWidth/2, cy = window.innerHeight/2;
  var r = 90, dir = 1, alive = true;

  function hideUploadHint() {
    alive = false;
    canvas.style.display = 'none';
    label.style.display  = 'none';
  }
  window.hideUploadHint = hideUploadHint;
  label.onclick = hideUploadHint;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    if (!alive) return;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Soft overlay — lighter so page content still readable
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Punch hole with radial gradient (transparent center)
    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0,   'rgba(0,0,0,1)');
    grad.addColorStop(0.75,'rgba(0,0,0,1)');
    grad.addColorStop(1,   'rgba(0,0,0,0)');

    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    // Glow ring
    ctx.beginPath();
    ctx.arc(cx, cy, r+2, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.65)';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // Animate pulse
  var frame;
  function animate() {
    if (!alive) return;
    r += dir * 0.35;
    if (r > 98) dir = -1;
    if (r < 74) dir = 1;
    draw();
    frame = requestAnimationFrame(animate);
  }

  function start() {
    var btn = document.getElementById('upload-btn-label');
    if (!btn) { setTimeout(start, 300); return; }
    var rect = btn.getBoundingClientRect();
    cx = rect.left + rect.width/2;
    cy = rect.top  + rect.height/2;

    // Position label below spotlight
    label.style.opacity = '0';
    animate();
    setTimeout(function(){
      var lw = label.offsetWidth || 230;
      label.style.left = Math.max(8, cx - lw/2) + 'px';
      label.style.top  = (cy + 108) + 'px';
      label.style.opacity = '1';
    }, 400);
  }

  setTimeout(start, 700);
})();
</script>

<!-- ===== PC Template Upload v5 – standalone, no React dependency ===== -->
<style>
#pc-btn-wrap{display:none;} /* hidden — button gets moved into header by patchHeader() */
#pc-btn{background:#059669;color:#fff;border:none;border-radius:12px;padding:9px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 3px 14px rgba(5,150,105,0.35);transition:all 0.2s;white-space:nowrap;}
#pc-btn:hover{background:#047857;}
#pc-btn.loaded{background:#0369a1;box-shadow:0 3px 14px rgba(3,105,161,0.35);}
#pc-badge{background:#ef4444;color:#fff;border-radius:99px;font-size:10px;font-weight:800;padding:1px 6px;display:none;}
#pc-file{display:none;}
#pc-debug-bar{display:none !important;} /* debug bar always hidden from user */
</style>

<div id="pc-btn-wrap">
  <button id="pc-btn" onclick="document.getElementById('pc-file').click()">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    PC ทุกแบรนด์
    <span id="pc-badge"></span>
  </button>
  <input type="file" id="pc-file" accept=".xlsx,.xls">
</div>
<div id="pc-debug-bar"></div>

<script>
(function(){
  var BRANDS=['Beger','Toa','ICI','Jotun','Captain','Nippon','RTB','Delta','Turbo','Pammastic','JBP','Sunke','Woodtect','Iloft','Loft8','TPI','Worldpaint'];
  // Map from PC template uppercase names → dashboard names
  var BRAND_MAP={'TOA':'Toa','NIPPON':'Nippon','JOTUN':'Jotun','CAPTAIN':'Captain','DELTA':'Delta','BEGER':'Beger','ICI':'ICI','JBP':'JBP','RTB':'RTB','PAMMASTIC':'Pammastic','WOODTECT':'Woodtect','ILOFT':'Iloft','TURBO':'Turbo','SUNKE':'Sunke','LOFT8':'Loft8','TPI':'TPI','WORLDPAINT':'Worldpaint'};
  var pcStores = null;  // {SAP: {Brand: actualCount}}
  var patchTimer = null;

  function log(msg){
    // Debug bar is hidden; use console only
    console.log('[PC]',msg);
  }

  /* ── XLSX lazy load ── */
  function loadXLSX(cb){
    if(window.XLSX){cb();return;}
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=function(){log('XLSX loaded');cb();};
    s.onerror=function(){showErrorToast('โหลด XLSX library ไม่ได้ กรุณาตรวจสอบอินเทอร์เน็ต');};
    document.body.appendChild(s);
  }

  /* ── Parse Template PC.xlsx (raw array-of-arrays) ── */
  function parse(rows){
    log('Parsing: '+rows.length+' rows');
    var h0=rows[0]||[], h1=rows[1]||[];
    var colMap={}, lastBrand='';
    for(var c=0;c<h0.length;c++){
      var v0=String(h0[c]||'').trim();
      if(v0 && v0.toLowerCase()!=='nan') lastBrand=v0;
      var v1=String(h1[c]||'').trim().toLowerCase();
      if(lastBrand && (v1==='model'||v1==='actual'||v1==='pro'))
        colMap[c]={brand:lastBrand,type:v1};
    }
    log('Brands found in header: '+Object.values(colMap).filter(function(x){return x.type==='actual';}).map(function(x){return x.brand;}).join(', '));

    var stores={}, totals={};
    BRANDS.forEach(function(b){totals[b]={model:0,actual:0};});

    for(var r=2;r<rows.length;r++){
      var row=rows[r];
      var rawSap=String(row[0]||'').trim();
      var hang=String(row[1]||'').trim();
      var branch=String(row[2]||'').trim();
      if(!rawSap||!hang||!branch||hang==='ห้าง') continue;
      var sap=rawSap.replace(/\.0+$/,'');
      if(!stores[sap]) stores[sap]={hang:hang,branch:branch};
      for(var ci in colMap){
        var info=colMap[ci];
        var val=parseFloat(row[ci])||0;
        if(!val) continue;
        var rawBrand=info.brand.trim().toUpperCase();
        var brand=BRAND_MAP[rawBrand]||(BRANDS.find(function(b){return b.toUpperCase()===rawBrand;})||null);
        if(!brand) continue;
        if(info.type==='actual'){
          stores[sap][brand]=(stores[sap][brand]||0)+val;
          totals[brand].actual+=val;
        } else if(info.type==='model'){
          stores[sap][brand+'_m']=(stores[sap][brand+'_m']||0)+val;
          totals[brand].model+=val;
        }
      }
    }
    log('Stores parsed: '+Object.keys(stores).length+' | Beger actual: '+totals['Beger'].actual);
    return {stores:stores, totals:totals};
  }

  /* ── Get SAP list from current filter (via exposed window.__lastCyY) ── */
  function getCurrentSAPs(){
    var cyY=window.__lastCyY||[];
    var seen={}, list=[];
    cyY.forEach(function(r){
      var sap=String(r.SAP||r['\u0e23\u0e2b\u0e31\u0e2a SAP']||'').trim().replace(/\.0+$/,'');
      if(sap&&!seen[sap]){seen[sap]=1;list.push(sap);}
    });
    return list;
  }

  /* ── Compute Actual + Model PC for brand from SAP list ── */
  function getPCBoth(brand, sapList){
    if(!pcStores) return {actual:0, model:0};
    var src = sapList&&sapList.length>0 ? sapList : Object.keys(pcStores);
    var actual=0, model=0;
    src.forEach(function(sap){
      actual+=((pcStores[sap]||{})[brand]||0);
      model+=((pcStores[sap]||{})[brand+'_m']||0);
    });
    return {actual:actual, model:model};
  }
  function getPC(brand, sapList){
    return getPCBoth(brand, sapList).actual;
  }

  /* ── Find competitor table rows by brand text ── */
  function findCompetitorRows(){
    var result=[];
    // Find all <tr> that have a cell containing a known brand name
    var trs=document.querySelectorAll('tbody tr');
    trs.forEach(function(tr){
      var tds=tr.querySelectorAll('td');
      if(tds.length<8) return;  // competitor table has 10 cols
      // Brand name is in td[1] (index 1), which has a dot + brand name
      var cell1=tds[1];
      if(!cell1) return;
      var txt=cell1.textContent.trim();
      var brand=BRANDS.find(function(b){var tl=txt.toLowerCase(),bl=b.toLowerCase();return tl===bl||tl.startsWith(bl+' ')||tl.endsWith(' '+bl)||tl.indexOf(bl)>=0;});
      if(brand) result.push({tr:tr, brand:brand, cells:tds});
    });
    return result;
  }

  /* ── Patch the PC cells in the competitor table ── */
  function patchTable(){
    if(!pcStores) return;
    var rows=findCompetitorRows();
    if(!rows.length){log('No competitor rows found yet');return;}
    log('Patching '+rows.length+' rows');

    var saps=getCurrentSAPs();
    var nm=window.__lastNumMonths||1;

    rows.forEach(function(item){
      var brand=item.brand;
      var tds=item.cells;
      var pc=getPCBoth(brand, saps);

      // PC column = 2nd from last (index tds.length-2)
      var pcIdx=tds.length-2;
      var avgIdx=tds.length-1;

      var pcCell=tds[pcIdx];
      var avgCell=tds[avgIdx];

      if(pcCell){
        if(pc.actual>0||pc.model>0){
          var missing=pc.model-pc.actual;
          var okColor=pc.actual>=pc.model?'#16a34a':'#dc2626';
          var html_c='<div style="text-align:right;line-height:1.35">';
          html_c+='<span style="font-size:11px;color:#64748b">'+pc.model+'</span>';
          html_c+='<span style="font-size:10px;color:#94a3b8"> / </span>';
          html_c+='<span style="font-weight:800;color:'+okColor+'">'+pc.actual+'</span>';
          if(missing>0){
            html_c+='<br><span style="font-size:9px;font-weight:700;color:#dc2626;background:#fee2e2;border-radius:4px;padding:1px 5px">ขาด '+missing+'</span>';
          }
          html_c+='</div>';
          pcCell.innerHTML=html_c;
          pcCell.style.textAlign='right';
          pcCell.style.verticalAlign='middle';
          pcCell.style.padding='4px 8px';
        } else {
          pcCell.textContent='-';
          pcCell.style.color='';
          pcCell.style.fontWeight='';
          pcCell.style.textAlign='right';
        }
      }

      // Avg/PC/month
      var pcActual=pc.actual;
      if(avgCell && pcActual>0 && nm>0){
        var ytdCell=tds[3];
        if(ytdCell){
          var ytdTxt=ytdCell.textContent.replace(/[,\u0e3f\s]/g,'');
          var ytd=parseFloat(ytdTxt)||0;
          if(ytd>0){
            var avg=Math.round(ytd/pcActual/nm);
            avgCell.textContent='\u0e3f'+avg.toLocaleString('th-TH');
            avgCell.style.color='#005AAB';
            avgCell.style.fontWeight='700';
          }
        }
      }
    });
    log('Patched OK – saps='+saps.length+' nm='+nm);
  }

  /* ── Patch "PC: X / Y" counters in ALL tabs ── */
  var pcCounterTimer=null;
  function patchPCCounters(){
    if(!pcStores) return;
    var saps=getCurrentSAPs();
    var src=saps.length>0 ? saps : Object.keys(pcStores);
    var actual=0, model=0;
    src.forEach(function(sap){
      actual+=((pcStores[sap]||{})['Beger']||0);
      model+=((pcStores[sap]||{})['Beger_m']||0);
    });
    if(!actual && !model) return;
    // Find all pill/badge elements containing "PC:" text
    document.querySelectorAll('div').forEach(function(el){
      if(el.childNodes.length<2) return;
      var txt=el.textContent||'';
      if(txt.indexOf('PC:')>=0 && txt.indexOf('/')>=0 && el.children.length<=3){
        var nodes=Array.from(el.childNodes);
        var pcNodeIdx=-1;
        nodes.forEach(function(n,i){
          if(n.nodeType===3){
            if(n.nodeValue && n.nodeValue.replace(/\s/g,'').indexOf('PC:')>=0){
              // Replace the "PC:" label text node with full "PC: [actual] "
              n.nodeValue=' PC: '+actual+' ';
              pcNodeIdx=i;
            }
          }
          if(n.nodeType===1 && n.tagName==='SPAN'){
            if(n.textContent && n.textContent.indexOf('/')>=0 && /\/\s*\d+/.test(n.textContent)){
              n.textContent='/ '+model;
            }
          }
        });
        // Clear the React-rendered pcCount number (text node right after "PC:" node)
        if(pcNodeIdx>=0){
          for(var j=pcNodeIdx+1;j<nodes.length;j++){
            var nn=nodes[j];
            if(nn.nodeType===3){
              var v=nn.nodeValue||'';
              // Wipe text nodes that are purely numeric (the React-rendered pcCount)
              if(/^\s*[\d,]+\s*$/.test(v)){ nn.nodeValue=''; }
            }
          }
        }
      }
    });
  }

  /* ── Force React useMemos to re-run after pcStores loads ── */
  function forceReactRerender(){
    try{
      var selects=document.querySelectorAll('select');
      if(!selects.length) return;
      var setter=Object.getOwnPropertyDescriptor(window.HTMLSelectElement.prototype,'value').set;

      // Try year select first (selects[0])
      var yearSel=selects[0];
      var curVal=yearSel.value;
      var altVal=null;
      for(var i=0;i<yearSel.options.length;i++){
        if(yearSel.options[i].value!==curVal){altVal=yearSel.options[i].value;break;}
      }
      if(altVal){
        setter.call(yearSel,altVal);
        yearSel.dispatchEvent(new Event('change',{bubbles:true}));
        setTimeout(function(){
          setter.call(yearSel,curVal);
          yearSel.dispatchEvent(new Event('change',{bubbles:true}));
        },80);
        return;
      }

      // Fallback: try month select (selects[1]) when year has only 1 option
      for(var si=1;si<selects.length;si++){
        var mSel=selects[si];
        var mCur=mSel.value;
        var mAlt=null;
        for(var j=0;j<mSel.options.length;j++){
          if(mSel.options[j].value!==mCur){mAlt=mSel.options[j].value;break;}
        }
        if(mAlt){
          setter.call(mSel,mAlt);
          mSel.dispatchEvent(new Event('change',{bubbles:true}));
          setTimeout(function(){
            setter.call(mSel,mCur);
            mSel.dispatchEvent(new Event('change',{bubbles:true}));
          },80);
          return;
        }
      }
    }catch(e){}
  }

  /* ── Patch branch color table (วิเคราะห์กลุ่ม MS%) ── */
  var colorTableTimer=null;
  function patchColorTable(){
    if(!pcStores) return;
    // Build branch→SAP map from window.__lastCyY
    var cyRows=window.__lastCyY||[];
    var branchSapMap={};
    cyRows.forEach(function(r){
      var sap=String(r.SAP||r[' SAP ']||r['SAP ']||'').replace(/\.0+$/,'').trim();
      var branch=String(r['\u0e2a\u0e32\u0e02\u0e32']||r['สาขา']||'').trim();
      if(sap && branch) branchSapMap[branch]=sap;
    });
    if(!Object.keys(branchSapMap).length) return;

    // Find the color table by locating a table with "PC" and "avg/PC" headers
    var tables=document.querySelectorAll('table');
    tables.forEach(function(table){
      var headerRow=table.querySelector('thead tr');
      if(!headerRow) return;
      var ths=Array.from(headerRow.querySelectorAll('th'));
      var hasPc=ths.some(function(th){return th.textContent.trim()==='PC';});
      var hasAvgPc=ths.some(function(th){return th.textContent.trim()==='avg/PC';});
      if(!hasPc||!hasAvgPc) return;

      // Find the selected month column index (header has bg-[#005AAB])
      var selColIdx=-1;
      ths.forEach(function(th,i){
        if(th.className&&th.className.indexOf('005AAB')>=0) selColIdx=i;
      });

      // Patch each data row
      var rows=table.querySelectorAll('tbody tr');
      rows.forEach(function(tr){
        var tds=Array.from(tr.querySelectorAll('td'));
        if(tds.length<4) return;

        // Branch name from first td's first child div
        var branchDiv=tds[0].querySelector('div');
        if(!branchDiv) return;
        var branchName=(branchDiv.textContent||'').trim();
        var sap=branchSapMap[branchName];
        if(!sap||!pcStores[sap]) return;

        var model=pcStores[sap]['Beger_m']||0;
        var actual=pcStores[sap]['Beger']||0;

        // ── Patch PC cell (td index 2) ──
        var pcTd=tds[2];
        var outerPcDiv=pcTd.querySelector('div');
        var spans=pcTd.querySelectorAll('span');
        // spans[0]=model (text-slate-400), spans[1]=actual, spans[2]=ขาด badge (may not exist)
        if(spans.length>=2){
          // Guard: skip if already correct
          if(String(spans[0].textContent)!==String(model)||String(spans[1].textContent)!==String(actual)){
            spans[0].textContent=model;
            spans[1].textContent=actual;
          }
          if(actual<model) spans[1].style.color='#e11d48';
          else spans[1].style.color='#005AAB';

          var missing=model-actual;
          var missBadge=pcTd.querySelector('span[class*="bg-rose"]');
          if(missing>0){
            // Create badge if it doesn't exist yet
            if(!missBadge){
              missBadge=document.createElement('span');
              missBadge.className='text-[8px] bg-rose-100 text-rose-700 px-1 rounded font-bold leading-none mt-0.5';
              if(outerPcDiv) outerPcDiv.appendChild(missBadge);
              else pcTd.appendChild(missBadge);
            }
            if(missBadge.textContent!=='\u0e02\u0e32\u0e14 '+missing){
              missBadge.textContent='\u0e02\u0e32\u0e14 '+missing;
            }
            missBadge.style.display='';
          } else if(missBadge){
            missBadge.style.display='none';
          }
        }

        // ── Patch avg/PC cell (td index 3) ──
        if(actual>0 && selColIdx>=0 && selColIdx<tds.length){
          // Extract Beger sales from the selected month column
          var monthTd=tds[selColIdx];
          var begerSales=0;
          var allSpans=monthTd.querySelectorAll('span');
          for(var si=0;si<allSpans.length;si++){
            var txt=allSpans[si].textContent||'';
            if(txt.indexOf('\u0e3f')>=0){  // ฿
              var num=parseFloat(txt.replace(/[^\d.]/g,''));
              if(!isNaN(num)&&num>0){begerSales=num;break;}
            }
          }
          if(begerSales>0){
            var avgPcVal=Math.round(begerSales/actual);
            var avgDiv=tds[3].querySelector('div');
            if(avgDiv) avgDiv.textContent='\u0e3f'+avgPcVal.toLocaleString('th-TH');
          }
        }
      });
    });
  }

  /* ── Patch LFL Analysis table (tab 2) PC column ── */
  var lflTableTimer=null;

  /* Find LFL table in DOM (has "Model PC"/"จำนวน PC" AND "Growth" in headers) */
  function findLflTable(){
    var tables=document.querySelectorAll('table');
    for(var ti=0;ti<tables.length;ti++){
      var ths=tables[ti].querySelectorAll('th');
      var hasPC=false,hasGrowth=false;
      ths.forEach(function(th){
        var txt=th.textContent||'';
        if(txt.indexOf('Model PC')>=0||txt.indexOf('\u0e08\u0e33\u0e19\u0e27\u0e19 PC')>=0) hasPC=true;
        if(txt.indexOf('Growth')>=0) hasGrowth=true;
      });
      if(hasPC&&hasGrowth) return tables[ti];
    }
    return null;
  }

  /* Build mall→{model,actual} from cyRows + pcStores for the selected month */
  function buildMallPcFromRows(cyRows){
    if(!pcStores||!cyRows.length) return {};
    var MONTHS=['\u0e21.\u0e04.','\u0e01.\u0e1e.','\u0e21\u0e35.\u0e04.','\u0e40\u0e21.\u0e22.','\u0e1e.\u0e04.','\u0e21\u0e34.\u0e22.','\u0e01.\u0e04.','\u0e2a.\u0e04.','\u0e01.\u0e22.','\u0e15.\u0e04.','\u0e1e.\u0e22.','\u0e18.\u0e04.'];
    var selects=document.querySelectorAll('select');
    var selMonth=null;
    for(var si=0;si<selects.length;si++){
      var sv=selects[si].value;
      if(sv&&MONTHS.indexOf(sv)>=0){selMonth=sv;break;}
    }
    if(!selMonth) return {};
    var map={};
    cyRows.forEach(function(r){
      if(r.Month!==selMonth) return;
      var sap=String(r.SAP||r[' SAP ']||r['SAP ']||r[' SAP']||'').replace(/\.0+$/,'').trim();
      var mall=String(r.Name||'').trim();
      if(!sap||!mall) return;
      var pc=pcStores[sap];
      if(!pc) return;
      if(!map[mall]) map[mall]={model:0,actual:0};
      map[mall].model+=(pc['Beger_m']||0);
      map[mall].actual+=(pc['Beger']||0);
    });
    return map;
  }

  function patchLflTable(){
    // ── Primary: window.__lflData set from React useMemo after forceReactRerender ──
    var lflArr=window.__lflData||[];
    var hasRealPc=lflArr.some(function(r){return r.total&&r.total.modelPc>0;});
    if(hasRealPc){
      var mallMap={};
      lflArr.forEach(function(row){
        mallMap[row.mall]={
          lfl:{model:row.lfl.modelPc,actual:row.lfl.actualPc},
          newB:{model:row.new.modelPc,actual:row.new.actualPc},
          total:{model:row.total.modelPc,actual:row.total.actualPc}
        };
      });
      log('[LFL] primary path: '+Object.keys(mallMap).length+' malls from __lflData');
      patchLflDom(mallMap,true);
      return;
    }

    if(!pcStores) return;

    // ── Fallback: branch-name bridge + branchTypeMap for LFL/New/Total split ──
    var cyRows=window.__lflCyY||window.__lastCyY||[];
    var btMap=window.__lflBranchTypeMap||{};
    var selMonth=window.__lflSelectedMonth||null;

    // Build branch→mall from cyRows (sales-data branch names)
    var branchMallMap={};
    cyRows.forEach(function(r){
      var br=String(r['\u0e2a\u0e32\u0e02\u0e32']||r.branch||'').trim();
      var ml=String(r.Name||'').trim();
      if(br&&ml) branchMallMap[br]=ml;
    });
    log('[LFL] branchMallMap: '+Object.keys(branchMallMap).length+' entries, btMap: '+Object.keys(btMap).length);

    // Walk pcStores: for each SAP, map branch→mall and branch→LFL|New type
    // Shape: mallSplit[mall] = {LFL:{model,actual}, New:{model,actual}, Total:{model,actual}}
    var mallSplit={};
    function ensureMall(m){
      if(!mallSplit[m]) mallSplit[m]={LFL:{model:0,actual:0},New:{model:0,actual:0},Total:{model:0,actual:0}};
    }
    Object.keys(pcStores).forEach(function(sap){
      var s=pcStores[sap];
      var branch=String(s.branch||'').trim();
      var mall=branchMallMap[branch]||String(s.hang||'').trim();
      if(!mall) return;
      var type=btMap[branch]||'LFL'; // default LFL if unknown
      var m=s['Beger_m']||0, a=s['Beger']||0;
      ensureMall(mall);
      mallSplit[mall][type].model+=m;
      mallSplit[mall][type].actual+=a;
      mallSplit[mall].Total.model+=m;
      mallSplit[mall].Total.actual+=a;
    });
    log('[LFL] mallSplit malls: '+Object.keys(mallSplit).length);

    if(!Object.keys(mallSplit).length){log('[LFL] no data');return;}

    var converted={};
    Object.keys(mallSplit).forEach(function(mall){
      var sp=mallSplit[mall];
      converted[mall]={
        lfl:{model:sp.LFL.model,actual:sp.LFL.actual},
        newB:{model:sp.New.model,actual:sp.New.actual},
        total:{model:sp.Total.model,actual:sp.Total.actual}
      };
    });
    patchLflDom(converted,true); // patchAll=true: LFL + New + Total
  }

  function patchLflDom(mallMap,patchAll){
    var lflTable=findLflTable();
    if(!lflTable){log('[LFL] LFL table not found in DOM');return;}
    var rows=Array.from(lflTable.querySelectorAll('tbody tr'));
    log('[LFL] patchLflDom: '+rows.length+' rows, malls in map: '+Object.keys(mallMap).join(', '));
    var patched=0;
    var i=0;
    while(i+2<rows.length){
      var lflCells=Array.from(rows[i].querySelectorAll('td'));
      // Identify mall name from rowspan cell (non-numeric text, rowSpan>=2)
      var mallName=null;
      for(var ci=0;ci<lflCells.length;ci++){
        if(lflCells[ci].rowSpan>=2){
          var ct=lflCells[ci].textContent.trim();
          if(ct&&!/^\d+$/.test(ct)){mallName=ct;break;}
        }
      }
      if(!mallName){i+=3;continue;}
      if(mallMap[mallName]){
        var pc=mallMap[mallName];
        // Total row PC: cells[2] of rows[i+2]
        var totCells=Array.from(rows[i+2].querySelectorAll('td'));
        if(totCells.length>=3) applyLflPcCell(totCells[2],pc.total.model,pc.total.actual);
        if(patchAll){
          // LFL row PC: cells[4] (after ลำดับ-rowspan and ห้าง-rowspan)
          if(lflCells.length>=5) applyLflPcCell(lflCells[4],pc.lfl.model,pc.lfl.actual);
          // New row PC: cells[2] of rows[i+1]
          var newCells=Array.from(rows[i+1].querySelectorAll('td'));
          if(newCells.length>=3) applyLflPcCell(newCells[2],pc.newB.model,pc.newB.actual);
        }
        patched++;
      } else {
        log('[LFL] no match for DOM mall: "'+mallName+'"');
      }
      i+=3;
    }
    log('[LFL] patched '+patched+' malls');
  }

  function applyLflPcCell(td,model,actual){
    if(model===null||actual===null) return;
    var outerDiv=td.querySelector('div');
    if(!outerDiv) return;
    var innerDiv=outerDiv.querySelector('div');
    if(!innerDiv) return;
    var spans=innerDiv.querySelectorAll('span');
    if(spans.length<3) return;
    var diff=model-actual;
    // Guard: skip DOM write if values already correct (prevents MutationObserver loop)
    if(String(spans[0].textContent)===String(model)&&
       String(spans[2].textContent)===String(actual)) return;
    spans[0].textContent=model;
    // spans[1] = "/"
    spans[2].textContent=actual;
    spans[2].style.color=diff>0?'#e11d48':'#005AAB';
    var badge=outerDiv.querySelector('span[class*="bg-rose"]');
    if(diff>0){
      if(!badge){
        badge=document.createElement('span');
        badge.className='text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded shadow-sm leading-none mt-0.5';
        outerDiv.appendChild(badge);
      }
      badge.textContent='\u0e02\u0e32\u0e14 '+diff;
    } else {
      if(badge) badge.remove();
    }
  }

  /* ── MutationObserver: re-patch when DOM changes ── */
  var headerTimer=null;
  var obs=new MutationObserver(function(){
    clearTimeout(headerTimer);
    headerTimer=setTimeout(patchHeader, 80);
    if(!pcStores) return;
    clearTimeout(patchTimer);
    patchTimer=setTimeout(patchTable, 150);
    clearTimeout(pcCounterTimer);
    pcCounterTimer=setTimeout(patchPCCounters, 200);
    clearTimeout(colorTableTimer);
    colorTableTimer=setTimeout(patchColorTable, 250);
    clearTimeout(lflTableTimer);
    lflTableTimer=setTimeout(patchLflTable, 300);
  });

  function patchHeader(){
    // ── Move PC button into header toolbar (next to Upload Excel) ──
    var uploadLabel=document.getElementById('upload-btn-label');
    var pcBtn=document.getElementById('pc-btn');
    if(uploadLabel&&pcBtn){
      var toolbar=uploadLabel.parentElement;
      if(toolbar&&!toolbar.contains(pcBtn)){
        toolbar.insertBefore(pcBtn,uploadLabel);
      }
    }

    // ── Rename จำนวน PC → Model PC / Act. in table headers ──
    var ths=document.querySelectorAll('th');
    if(!ths.length) return;
    ths.forEach(function(th){
      var txt=th.textContent.trim();
      if((txt==='จำนวน PC'||txt.indexOf('จำนวน PC')>=0) && txt.indexOf('Model PC')<0){
        th.innerHTML='<div style="line-height:1.5;text-align:center;white-space:nowrap">'+
          '<span style="font-size:12px;font-weight:700">Model PC</span><br>'+
          '<span style="color:#60a5fa;font-size:11px;font-weight:600">/ Act.</span></div>';
      }
      th.style.cssText+= ';height:56px !important;min-height:56px;vertical-align:middle;'+
        'padding-top:8px;padding-bottom:8px;white-space:normal;line-height:1.4;';
    });
    document.querySelectorAll('thead tr').forEach(function(tr){
      tr.style.height='56px';
      tr.style.minHeight='56px';
    });
  }
  setTimeout(patchHeader,800);
  setTimeout(patchHeader,1800);

  function startObs(){
    var root=document.getElementById('root');
    if(root){obs.observe(root,{childList:true,subtree:true});}
    else{setTimeout(startObs,500);}
  }
  setTimeout(startObs, 600);

  /* ── File input handler ── */
  document.getElementById('pc-file').addEventListener('change',function(e){
    var file=e.target.files[0];
    if(!file) return;
    e.target.value='';
    var btn=document.getElementById('pc-btn');
    btn.style.opacity='0.5';
    btn.textContent='⏳ กำลังโหลด...';

    loadXLSX(function(){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var wb=window.XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var rows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          var parsed=parse(rows);
          var storeCount=Object.keys(parsed.stores).length;
          if(storeCount===0) throw new Error('ไม่พบข้อมูลสาขา กรุณาใช้ Template PC.xlsx');
          pcStores=parsed.stores;
          window.__pcStores=pcStores;

          // Update button
          btn.innerHTML='<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> PC: '+parsed.totals['Beger'].actual+'/'+parsed.totals['Beger'].model;
          btn.style.opacity='1';
          btn.classList.add('loaded');
          var badge=document.getElementById('pc-badge');
          if(badge) badge.style.display='none';

          // Force React useMemos to re-run with new pcStores data
          setTimeout(forceReactRerender, 100);
          // Patch competitor table immediately + retries
          patchTable();
          setTimeout(patchTable,300);
          setTimeout(patchTable,800);
          setTimeout(patchTable,2000);
          // Patch PC counters in all tabs
          patchPCCounters();
          setTimeout(patchPCCounters,500);
          setTimeout(patchPCCounters,1500);
          // Patch branch color table (วิเคราะห์กลุ่ม MS%)
          setTimeout(patchColorTable,400);
          setTimeout(patchColorTable,1200);
          // Patch LFL Analysis table Total-row PC
          setTimeout(patchLflTable,500);
          setTimeout(patchLflTable,1500);

          showToast(storeCount, parsed.totals);
        }catch(err){
          btn.innerHTML='PC ทุกแบรนด์';
          btn.style.opacity='1';
          log('ERROR: '+err.message);
          showErrorToast('\u26a0\ufe0f '+err.message);
        }
      };
      reader.onerror=function(){showErrorToast('อ่านไฟล์ไม่ได้');};
      reader.readAsArrayBuffer(file);
    });
  });

  /* ── Toast ── */
  function showToast(n, totals){
    var ex=document.getElementById('pc-toast');if(ex)ex.remove();
    var b=totals['Beger']||{actual:0,model:0};
    var pct=b.model>0?(b.actual/b.model*100).toFixed(1):'0';
    var t=document.createElement('div');
    t.id='pc-toast';
    t.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99999;background:#0f172a;color:#f1f5f9;padding:14px 20px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5);font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;display:flex;align-items:flex-start;gap:12px;min-width:350px;max-width:88vw;border:1px solid rgba(255,255,255,0.1)';
    t.innerHTML='<div style="font-size:22px">\ud83d\udcca</div><div style="flex:1">'+
      '<div style="font-weight:800;color:#34d399;margin-bottom:4px">PC โหลดสำเร็จ — '+n+' สาขา</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:6px 16px;font-size:12px">'+
        '<span>\u2b50 Beger '+b.actual+'/'+b.model+' ('+pct+'%)</span>'+
        '<span>TOA '+(totals['TOA']?totals['TOA'].actual:0)+'</span>'+
        '<span>NIPPON '+(totals['NIPPON']?totals['NIPPON'].actual:0)+'</span>'+
        '<span>JOTUN '+(totals['JOTUN']?totals['JOTUN'].actual:0)+'</span>'+
      '</div>'+
      '<div style="font-size:11px;color:#64748b;margin-top:4px">เปิดแท็บ "คู่แข่ง" เพื่อดูจำนวน PC รายแบรนด์</div>'+
    '</div><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:18px">\u00d7</button>';
    document.body.appendChild(t);
    setTimeout(function(){if(t.parentElement)t.remove();},8000);
  }

  /* ── Error Toast (replaces alert) ── */
  function showErrorToast(msg){
    var ex=document.getElementById('pc-toast');if(ex)ex.remove();
    var t=document.createElement('div');
    t.id='pc-toast';
    t.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99999;background:#1e0a0a;color:#fca5a5;padding:14px 20px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5);font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;display:flex;align-items:flex-start;gap:12px;min-width:300px;max-width:88vw;border:1px solid rgba(239,68,68,0.3)';
    t.innerHTML='<div style="font-size:20px">⚠️</div><div style="flex:1"><div style="font-weight:700;margin-bottom:2px">เกิดข้อผิดพลาด</div><div style="font-size:12px;color:#fca5a5;opacity:0.85">'+msg+'</div></div><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:18px">×</button>';
    document.body.appendChild(t);
    setTimeout(function(){if(t.parentElement)t.remove();},6000);
  }
})();
</script>
